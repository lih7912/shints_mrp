<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>메뉴별 접근권한 관리</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <link href="./authority.css" rel="stylesheet" />
        <!-- jQuery CDN -->
        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.css"
            integrity="sha512-3pIirOrwegjM6erE5gPSwkUzO+3cTjpnV9lexlNZqvupR64iZBnOOTiiLPb9M36zpMScbmUNIcHUqKD47M719g=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"
            integrity="sha512-VEd+nq25CkR676O+pLBnDW09R7VQX9Mdiij052gVCp5yVH3jGtH70Ho/UUv4mJDsEdTvqRCFZg0NKGiojGnUCw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
    </head>
    <body>
        <div class="container-fluid mt-4 w-50">
            <h3>메뉴별 접근권한 관리</h3>
            <span style="color: gray"
                >부서의 권한이 먼저 적용되고 아이디(이름)의 권한이
                적용됩니다.</span
            >
            <div class="row mt-5">
                <!-- Left Column -->
                <div class="col-md-5 sticky-left">
                    <!-- 부서 필터 -->
                    <div class="mb-3">
                        <label for="departmentFilter" class="form-label"
                            >부서</label
                        >
                        <div
                            class="d-flex justify-content-between align-items-center"
                        >
                            <select
                                id="departmentSelect"
                                class="form-select me-2"
                                style="width: 80%"
                                onchange="
                                    $('#authTable tbody').children().remove()
                                "
                            ></select>
                            <button
                                class="btn btn-primary btn-md"
                                id="departmentSearchBtn"
                            >
                                검색
                            </button>
                        </div>
                    </div>

                    <!-- 아이디 필터 -->
                    <div class="mb-3">
                        <label for="userIdFilter" class="form-label"
                            >아이디</label
                        >
                        <div
                            class="d-flex justify-content-between align-items-center"
                        >
                            <select
                                id="userIdSelect"
                                class="form-select me-2"
                                style="width: 80%"
                                onchange="
                                    $('#authTable tbody').children().remove()
                                "
                            ></select>
                            <button
                                class="btn btn-primary btn-md"
                                id="userIdSearchBtn"
                            >
                                검색
                            </button>
                        </div>
                    </div>

                    <!-- 이름 필터 -->
                    <div class="mb-3">
                        <label for="nameFilter" class="form-label">이름</label>
                        <div
                            class="d-flex justify-content-between align-items-center"
                        >
                            <select
                                id="nameSelect"
                                class="form-select me-2"
                                style="width: 80%"
                                onchange="
                                    $('#authTable tbody').children().remove()
                                "
                            ></select>
                            <button
                                class="btn btn-primary btn-md"
                                id="nameSearchBtn"
                            >
                                검색
                            </button>
                        </div>
                    </div>

                    <!-- 화면 초기화 버튼 -->
                    <div class="mt-4">
                        <button
                            class="btn btn-danger btn-md w-100"
                            id="resetBtn"
                        >
                            화면 초기화
                        </button>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="col-md-7">
                    <table class="table" id="authTable">
                        <thead>
                            <tr>
                                <th scope="col" class="col-6">메뉴 이름</th>
                                <th scope="col">읽기 권한</th>
                                <th scope="col">쓰기 권한</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./authority.js"></script>
    </body>
</html>
